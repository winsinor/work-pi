<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Display Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #aaa; }
  #img-wrap {
    background: #000;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
    max-width: 100%;
  }
  #screen {
    display: block;
    max-width: 100%;
    image-rendering: pixelated;
  }
  #ts { font-size: 12px; color: #666; margin-top: 10px; }
  #err { color: #e55; font-size: 14px; margin-top: 10px; display: none; }
  button {
    margin-top: 20px;
    padding: 10px 28px;
    background: #1a6fce;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  button:hover:not(:disabled) { background: #1558a8; }
</style>
</head>
<body>
<h1>Display Preview</h1>
<div id="img-wrap"><img id="screen" alt="Display"></div>
<div id="ts"></div>
<div id="err"></div>
<button id="btn">Capture Screen</button>

<script>
async function capture() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true;
  btn.textContent = 'Capturing…';
  err.style.display = 'none';
  try {
    const resp = await fetch('/api/screenshot');
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({error: resp.statusText}));
      throw new Error(data.error || resp.statusText);
    }
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    document.getElementById('screen').src = url;
    document.getElementById('ts').textContent = 'Captured at ' + new Date().toLocaleTimeString();
  } catch (e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

document.getElementById('btn').addEventListener('click', capture);
capture();
</script>
</body>
</html>
